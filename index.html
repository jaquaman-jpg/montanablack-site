<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MontanaBlack88</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;

      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      color: white;
    }

    h1 {
      font-size: 95px;
      margin-bottom: 35px;
      text-shadow: 0 0 25px rgba(255,255,255,0.15);
    }

    button {
      padding: 16px 42px;
      font-size: 22px;
      border: none;
      border-radius: 14px;
      cursor: pointer;

      background: white;

      box-shadow: 0 0 18px white;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
    }

    .footer {
      position: absolute;
      bottom: 15px;
      right: 20px;
      color: #777;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <canvas id="trail"></canvas>

  <div class="content">

    <h1>MontanaBlack88</h1>

    <a href="biografie.html">
      <button>Biografie</button>
    </a>

  </div>

  <div class="footer">
    Published by AQA.
  </div>

 <script>

  const canvas = document.getElementById("trail");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let trail = [];

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  document.addEventListener("mousemove", (e) => {

    trail.push({
      x: e.clientX,
      y: e.clientY,
      life: 1
    });

  });

  function animate() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 4;
    ctx.lineCap = "round";

    for (let i = 0; i < trail.length - 1; i++) {

      let p1 = trail[i];
      let p2 = trail[i + 1];

      ctx.beginPath();

      ctx.strokeStyle = `rgba(120, 0, 0, ${p1.life})`;

      ctx.shadowBlur = 20;
      ctx.shadowColor = "darkred";

      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);

      ctx.stroke();

      p1.life -= 0.0025;

      if (p1.life <= 0) {
        trail.splice(i, 1);
        i--;
      }

    }

    requestAnimationFrame(animate);

  }

  animate();

</script>
