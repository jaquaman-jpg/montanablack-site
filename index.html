<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MontanaBlack88</title>

  <style>

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(-45deg, #111, #222, #333, #111);
      background-size: 400% 400%;
      animation: backgroundMove 10s ease infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    h1 {
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    button {
      margin-top: 30px;
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;

      background: white;

      transition: 0.3s;
      animation: glow 2s infinite;
    }

    button:hover {
      transform: scale(1.1);
    }

    .footer {
      position: absolute;
      bottom: 15px;
      right: 20px;
      color: #aaa;
      font-size: 14px;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    @keyframes glow {
      0% {
        box-shadow: 0 0 10px white;
      }

      50% {
        box-shadow: 0 0 30px white;
      }

      100% {
        box-shadow: 0 0 10px white;
      }
    }

    @keyframes backgroundMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

  </style>
</head>

<body>

  <h1>MontanaBlack88</h1>

  <a href="biografie.html">
    <button>Biografie</button>
  </a>

  <div class="footer">
    Published by AQA.
  </div>

</body>
</html>
