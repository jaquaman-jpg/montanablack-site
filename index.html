<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MontanaBlack88</title>

  <style>

    body {
      margin: 0;
      height: 100vh;
      background: #111;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Animation links */

    .circle {
      position: absolute;
      left: 120px;
      width: 250px;
      height: 250px;

      background: rgba(255,255,255,0.08);

      border-radius: 50%;

      animation: pulse 4s infinite ease-in-out;
      filter: blur(10px);
    }

    h1 {
      font-size: 80px;
      margin-bottom: 30px;
      z-index: 2;
    }

    button {
      padding: 15px 40px;
      font-size: 22px;
      border: none;
      border-radius: 15px;
      cursor: pointer;

      background: white;

      box-shadow: 0 0 20px white;

      transition: 0.3s;

      z-index: 2;
    }

    button:hover {
      transform: scale(1.08);
    }

    .footer {
      position: absolute;
      bottom: 15px;
      right: 20px;
      color: #888;
      font-size: 14px;
    }

    @keyframes pulse {

      0% {
        transform: scale(1);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.3);
        opacity: 0.8;
      }

      100% {
        transform: scale(1);
        opacity: 0.4;
      }

    }

  </style>
</head>

<body>

  <div class="circle"></div>

  <h1>MontanaBlack88</h1>

  <a href="biografie.html">
    <button>Biografie</button>
  </a>

  <div class="footer">
    Published by AQA.
  </div>

</body>
</html>
